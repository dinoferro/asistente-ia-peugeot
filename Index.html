<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Asesor IA Peugeot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }

    .chat-container {
      max-width: 800px;
      margin: 40px auto;
      height: 85vh;
      background: white;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .header {
      background: #111827;
      color: white;
      padding: 15px;
    }

    .header h2 {
      margin: 0;
    }

    .messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background: #f9fafb;
    }

    .message {
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 10px;
      max-width: 70%;
      white-space: pre-wrap;
    }

    .user {
      background: #2563eb;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: #e5e7eb;
      color: black;
    }

    .input-area {
      padding: 10px;
      border-top: 1px solid #ddd;
      display: flex;
    }

    textarea {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: none;
    }

    button {
      margin-left: 10px;
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

<div class="chat-container">

  <div class="header">
    <h2>Asesor IA - Peugeot</h2>
    <p style="margin:0;font-size:13px;">Consultas sobre planes, cuotas y adjudicación</p>
  </div>

  <div id="messages" class="messages">
    <div class="message bot">Hola 👋 Podés preguntarme por planes, cuotas y adjudicación.</div>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Escribí tu consulta..."></textarea>
    <button onclick="sendMessage()">Enviar</button>
  </div>

</div>

<script>
  //  PEGar TU WEBHOOK
  const WEBHOOK_URL = "https://dinoferro.app.n8n.cloud/webhook-test/Chat peugeot";

  const messagesDiv = document.getElementById("messages");
  const input = document.getElementById("input");

  function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "message " + type;
    div.textContent = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const loading = document.createElement("div");
    loading.className = "message bot";
    loading.textContent = "Escribiendo...";
    messagesDiv.appendChild(loading);

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          chatInput: text
        })
      });

      const data = await response.json();

      loading.remove();

      const reply = data.reply || "No pude responder.";
      addMessage(reply, "bot");

    } catch (error) {
      loading.remove();
      addMessage("Error conectando con el servidor.", "bot");
      console.error(error);
    }
  }

  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>

</body>
</html>
